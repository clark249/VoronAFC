#
#####################################################################################################################################  

[bed_mesh]
zero_reference_position: 175,175  
#    This option is suitable for the 350 model. 
#    set this to the middle of your bed
speed: 300           #    movement speed of toolhead during bed mesh
horizontal_move_z: 3 #    height of scanner during bed mesh scan
mesh_min: 30, 30     #    start point of bed mesh [X, Y]
mesh_max: 320, 320   #    end point of bed mesh [X, Y]
probe_count: 30, 30
mesh_pps: 0,0        # Disable interpolation - mesh is probably dense enough
algorithm: bicubic


