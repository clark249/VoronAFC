[include mainsail.cfg]  # Include configuration from mainsail.cfg file
[include fans.cfg] 
[include goose_belt.cfg]
#[include NozzleClean.cfg]
[include led_effects.cfg]
#[include ServiceSettings.cfg]
[include macros.cfg]
[include ServiceMacros.cfg]
#[include timelapse.cfg]
[include AFC/*.cfg]
